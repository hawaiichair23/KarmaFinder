<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel</title>
    <style>
        html {
            font-size: 90%;
            overflow-y: scroll;
            color: white;
        } 

        /* Dark Mode Variables */
        body {
            --background-color: #151416;
            --card-color: #202022;
            --input-bg: #1c1c1f;
            --comments-bg: #2e2e32;
            --suggestions-bg: #232326;

            --text-color: #f5f5f5;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --light-text: #787c7e;
            --meta-text: #8a8a91;
            --placeholder-bg: #2e2e32;
            --darkborder: #3a3a44;

            /* footie */
            --footie-color: #636363;

            --border-color: #333337;
            --border-dark: #6b6b6b;
            --shadow-light: rgba(0, 0, 0, 0.3);
            --hover-bg: #36363a;
            --button-bg: #29292d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: var(--background-color);
        }

        h2 {
            color: rgb(236, 234, 233);
            font-family: 'Segoe UI';
        }

        .emergency-btn {
            background: var(--card-color);
            color: white;
            font-family: 'Segoe UI';
            font-weight: 600;
            padding: 17px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            border-style: solid;
            border-width: 1.5px;
            box-shadow: inset 0 0 1px var(--darkborder);
            border-color: var(--border-color);
        }

        .emergency-btn:hover {
            background-color: var(--hover-bg);
        }

        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .normal {
            background: rgb(82, 175, 82);
        }

        .emergency {
            background: rgb(182, 62, 62);
        }
    </style>
</head>

<body>
    <h2>Admin Panel</h2>

    <div id="status" class="status normal">✅ Normal Operation</div>

    <script>
        // Admin panel ready for future features
    </script>
</body>

</html>
